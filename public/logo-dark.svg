<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- 4-Pointed Faceted Imperial Star (Compass Rose) -->
  <!-- North Point -->
  <polygon points="50,8 50,50 58,42" fill="#aa8439" />
  <polygon points="50,8 42,42 50,50" fill="#d4af37" />
  
  <!-- East Point -->
  <polygon points="92,50 50,50 58,42" fill="#d4af37" />
  <polygon points="92,50 58,58 50,50" fill="#aa8439" />
  
  <!-- South Point -->
  <polygon points="50,92 50,50 58,58" fill="#d4af37" />
  <polygon points="50,92 42,58 50,50" fill="#aa8439" />
  
  <!-- West Point -->
  <polygon points="8,50 50,50 42,58" fill="#d4af37" />
  <polygon points="8,50 42,42 50,50" fill="#aa8439" />
  
  <!-- Central Imperial Medallion -->
  <circle cx="50" cy="50" r="18" fill="#2B7574" stroke="#070b0d" stroke-width="2.5" />
  
  <!-- Stylized Imperial Crown inside the Medallion -->
  <!-- Crown Peaks -->
  <path d="M40,55 L36,43 L44,47 L50,38 L56,47 L64,43 L60,55 Z" fill="#ffffff" />
  <!-- Crown Base Band -->
  <rect x="39" y="55" width="22" height="3.5" rx="1" fill="#d4af37" />
  <!-- Jewels on the Base Band -->
  <circle cx="43" cy="56.7" r="0.7" fill="#ff4d4d" />
  <circle cx="50" cy="56.7" r="0.7" fill="#53bfd2" />
  <circle cx="57" cy="56.7" r="0.7" fill="#ff4d4d" />
</svg>
