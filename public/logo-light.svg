        fill="none" stroke="#2B7574" stroke-width="4" stroke-linejoin="round" />
        
  <!-- LDAP Directory Information Tree - DIT -->
  <!-- Branches -->
  <line x1="50" y1="32" x2="50" y2="68" stroke="#861211" stroke-width="2.5" />
  <line x1="50" y1="48" x2="38" y2="58" stroke="#861211" stroke-width="2" />
  <line x1="50" y1="48" x2="62" y2="58" stroke="#861211" stroke-width="2" />
  
  <!-- Nodes (Sober, Opaque circles masked with white background) -->
