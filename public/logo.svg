<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Concentric dashed circles (Degraded Networks & Sync Orbit) -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="var(--vp-c-brand)" stroke-width="2" stroke-dasharray="6,4" opacity="0.35" />
  <circle cx="60" cy="60" r="46" fill="none" stroke="var(--vp-c-brand)" stroke-width="1.5" stroke-dasharray="10,6" opacity="0.55" />
  
  <!-- Tactical Shield Contour (Resilience & Security) -->
  <path d="M60,24 C72,24 82,20 86,16 C86,36 84,68 60,96 C36,68 34,36 34,16 C38,20 48,24 60,24 Z" 
        fill="none" stroke="var(--vp-c-brand)" stroke-width="4.5" stroke-linejoin="round" />
        
  <!-- LDAP Directory Information Tree - DIT (Structured Data) -->
  <!-- Branches -->
  <line x1="60" y1="36" x2="60" y2="72" stroke="var(--vp-c-brand-2)" stroke-width="3" />
  <line x1="60" y1="52" x2="48" y2="62" stroke="var(--vp-c-brand-2)" stroke-width="2.5" />
  <line x1="60" y1="52" x2="72" y2="62" stroke="var(--vp-c-brand-2)" stroke-width="2.5" />
  
  <!-- Symmetrical Nodes (Sober, Opaque circles masked with background color) -->
  <circle cx="60" cy="36" r="5.5" fill="var(--vp-c-brand)" stroke="var(--vp-c-bg)" stroke-width="1.5" />
  <circle cx="60" cy="72" r="5.5" fill="var(--vp-c-brand)" stroke="var(--vp-c-bg)" stroke-width="1.5" />
  <circle cx="48" cy="62" r="4.5" fill="var(--vp-c-brand-2)" stroke="var(--vp-c-bg)" stroke-width="1.5" />
  <circle cx="72" cy="62" r="4.5" fill="var(--vp-c-brand-2)" stroke="var(--vp-c-bg)" stroke-width="1.5" />
</svg>
